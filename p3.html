<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
  :root{
    --bg:#0F2A2E; --surface:#163A40; --surface-2:#1E484E;
    --paper:#F3EBDD; --paper-ink:#26342F;
    --gold:#E8B84B; --gold-deep:#C2922B;
    --jade:#7FB7A6; --ink:#E9EFEC; --muted:#8FA8A3;
    --line:rgba(233,239,236,.10); --danger:#D98A7A;
    --display:"Fraunces",ui-serif,Georgia,serif;
    --body:"Pretendard Variable",Pretendard,system-ui,-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased}
  body{max-width:560px;margin:0 auto;padding:max(16px,env(safe-area-inset-top)) 16px calc(40px + env(safe-area-inset-bottom))}
  .num{font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  header{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin:6px 2px 18px}
  header h1{font-family:var(--display);font-weight:900;font-size:24px;letter-spacing:-.02em}
  header .sub{font-size:12px;color:var(--muted);margin-top:3px}
  header .count{font-family:var(--display);font-weight:600;font-size:13px;color:var(--gold);white-space:nowrap}
  .hero{background:var(--paper);color:var(--paper-ink);border-radius:22px;padding:22px 22px 20px;position:relative;overflow:hidden;box-shadow:0 18px 40px -22px rgba(0,0,0,.6)}
  .hero .eyebrow{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-deep)}
  .hero .seq{position:absolute;top:18px;right:20px;font-family:var(--display);font-weight:600;font-size:13px;color:#9b8e76}
  .hero .amount{font-family:var(--display);font-weight:900;font-size:clamp(38px,12vw,52px);line-height:1;margin:8px 0 2px;letter-spacing:-.03em}
  .hero .amount .cur{font-size:.62em;font-weight:600;margin-right:2px;vertical-align:.04em}
  .hero .delta{font-size:12.5px;color:#7d7460}
  .bar{height:8px;border-radius:99px;background:#e0d4bf;margin:16px 0 6px;overflow:hidden}
  .bar > i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--jade),var(--gold-deep));transition:width .6s cubic-bezier(.2,.7,.2,1)}
  .bar-meta{display:flex;justify-content:space-between;font-size:11.5px;color:#8a8068}
  .stamp-btn{margin-top:18px;width:100%;border:none;border-radius:14px;background:var(--paper-ink);color:var(--paper);font-family:var(--body);font-weight:700;font-size:16px;padding:15px;cursor:pointer;transition:transform .12s,background .2s;display:flex;align-items:center;justify-content:center;gap:8px}
  .stamp-btn:hover{background:#1a241f}
  .stamp-btn:active{transform:scale(.985)}
  .hero.done{text-align:center}
  .hero.done .amount{color:var(--gold-deep)}
  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:14px 0 18px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:12px 12px 11px}
  .stat .k{font-size:11px;color:var(--muted);font-weight:600}
  .stat .v{font-family:var(--display);font-weight:600;font-size:19px;margin-top:3px}
  .stat .v small{font-size:12px;color:var(--muted);font-weight:500;font-family:var(--body)}
  .reward-strip{display:flex;align-items:center;gap:12px;background:linear-gradient(100deg,#1E484E,#163A40);border:1px solid var(--line);border-radius:14px;padding:13px 15px;margin-bottom:18px}
  .reward-strip .seal{flex:none;width:34px;height:34px;border-radius:50%;background:var(--gold);color:#3a2c08;display:grid;place-items:center;font-size:17px;box-shadow:0 0 0 4px rgba(232,184,75,.14)}
  .reward-strip .txt{font-size:13px;line-height:1.4}
  .reward-strip .txt b{color:var(--gold)}
  .reward-strip .txt span{color:var(--muted)}
  .filters{display:flex;gap:6px;margin-bottom:10px}
  .filters button{flex:1;border:1px solid var(--line);background:transparent;color:var(--muted);font-family:var(--body);font-size:12.5px;font-weight:600;padding:8px 4px;border-radius:10px;cursor:pointer;transition:.15s}
  .filters button[aria-pressed="true"]{background:var(--surface);color:var(--ink);border-color:transparent}
  #list{display:flex;flex-direction:column;gap:7px}
  .row{display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:12px 14px;cursor:pointer;transition:background .15s}
  .row:hover{background:var(--surface-2)}
  .row .no{font-family:var(--display);font-weight:600;font-size:13px;color:var(--muted);width:34px;flex:none}
  .row .mid{flex:1;min-width:0}
  .row .amt{font-weight:600;font-size:15px}
  .row .rwd{font-size:12px;color:var(--gold);margin-top:2px;display:flex;align-items:center;gap:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .right{flex:none;text-align:right}
  .row .date{font-size:12.5px;color:var(--jade);font-weight:600}
  .row .todo{font-size:12px;color:var(--muted)}
  .row.is-done{background:var(--surface-2)}
  .row.is-done .amt{color:var(--jade)}
  .row.is-reward .no{color:var(--gold)}
  .stamp-seal{display:inline-grid;place-items:center;width:30px;height:30px;border-radius:50%;border:2px solid var(--jade);color:var(--jade);font-size:13px;transform:rotate(-12deg);flex:none}
  .row.is-reward .stamp-seal{border-color:var(--gold);color:var(--gold)}
  .row.next{outline:2px solid var(--gold);outline-offset:-2px}
  footer{margin-top:22px;display:flex;gap:8px;flex-wrap:wrap}
  footer button{flex:1;min-width:120px;background:transparent;border:1px solid var(--line);color:var(--muted);font-family:var(--body);font-size:12.5px;font-weight:600;padding:11px;border-radius:11px;cursor:pointer}
  footer button:hover{color:var(--ink)}
  footer button.reset{color:var(--danger);border-color:rgba(217,138,122,.3)}
  .note{font-size:11px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.6}
  #banner{display:none;background:rgba(232,184,75,.12);border:1px solid rgba(232,184,75,.3);color:var(--gold);font-size:12px;border-radius:11px;padding:10px 12px;margin-bottom:14px;line-height:1.5}
  .modal-bg{position:fixed;inset:0;background:rgba(8,18,20,.6);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center;z-index:50}
  .modal-bg.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:20px 20px 0 0;width:100%;max-width:560px;padding:22px 20px calc(24px + env(safe-area-inset-bottom));animation:up .25s cubic-bezier(.2,.7,.2,1)}
  @keyframes up{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal h3{font-family:var(--display);font-weight:600;font-size:20px;display:flex;align-items:baseline;gap:8px}
  .modal h3 span{font-size:13px;color:var(--muted);font-family:var(--body)}
  .modal .big{font-family:var(--display);font-weight:900;font-size:30px;margin:6px 0 16px;color:var(--gold)}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-bottom:6px}
  .field input{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);font-family:var(--body);font-size:15px;padding:12px;border-radius:11px}
  .field input::placeholder{color:#5c726d}
  .m-actions{display:flex;gap:8px;margin-top:6px}
  .m-actions button{flex:1;border:none;border-radius:12px;font-family:var(--body);font-weight:700;font-size:15px;padding:14px;cursor:pointer}
  .b-primary{background:var(--gold);color:#3a2c08}
  .b-ghost{background:transparent;border:1px solid var(--line)!important;color:var(--muted)}
  .b-clear{background:transparent;border:1px solid rgba(217,138,122,.3)!important;color:var(--danger);flex:0 0 auto!important;padding:14px 16px!important}
  #fx{position:fixed;inset:0;pointer-events:none;z-index:60}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
  <header>
    <div><h1>복리 통장 (3%)</h1><div class="sub">$5,500 → $102,624 · 3%씩 100번</div></div>
    <div class="count num" id="hCount">0 / 100</div>
  </header>
  <div id="banner"></div>
  <section class="hero" id="hero"></section>
  <div class="stats">
    <div class="stat"><div class="k">현재 도달</div><div class="v num" id="sCur">–</div></div>
    <div class="stat"><div class="k">달성</div><div class="v num" id="sDone">0<small> 개</small></div></div>
    <div class="stat"><div class="k">남은 선물</div><div class="v num" id="sRew">0<small> 개</small></div></div>
  </div>
  <div class="reward-strip" id="rewardStrip" style="display:none"></div>
  <div class="filters" id="filters">
    <button data-f="all" aria-pressed="true">전체</button>
    <button data-f="todo">미달성</button>
    <button data-f="done">달성</button>
    <button data-f="reward">선물</button>
  </div>
  <div id="list"></div>
  <footer>
    <button id="exportBtn">백업 내보내기</button>
    <button id="importBtn">백업 불러오기</button>
    <button id="resetBtn" class="reset">전체 초기화</button>
    <input type="file" id="fileIn" accept="application/json" hidden>
  </footer>
  <div class="note">진행 상황은 이 기기에 저장됩니다. 휴대폰에서는 브라우저 메뉴 → "홈 화면에 추가"로 앱처럼 쓰세요.<br>기기를 옮기거나 가족과 공유하려면 "백업 내보내기"로 파일을 주고받으면 됩니다.</div>
  <div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
  <canvas id="fx"></canvas>
<script>
(() => {
  const KEY = 'compoundPassbook.3pct';
  const START = 5500, RATE = 1.03, N = 100, CUR = '$';
  const DEFAULT_REWARDS = (() => {
    const r={}, tier=s=> s<=30?'작은 보상': s<=70?'중간 보상':'큰 보상';
    for(let s=10;s<=N;s+=10) r[s]=tier(s);
    return r;
  })();
  const milestones = Array.from({length:N}, (_,i) => ({ seq:i+1, amount:Math.round(START*Math.pow(RATE,i)) }));
  let state, memOnly=false;
  function load(){
    try{ const s=localStorage.getItem(KEY); state=s?JSON.parse(s):null; }catch(e){ state=null; }
    if(!state) state={achieved:{}, rewards:{...DEFAULT_REWARDS}};
    if(!state.achieved) state.achieved={};
    if(!state.rewards) state.rewards={};
  }
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }
    catch(e){ if(!memOnly){memOnly=true; banner('미리보기에서는 저장되지 않습니다. 파일을 내려받아 사용하세요.');} } }
  function banner(msg){ const b=document.getElementById('banner'); b.textContent=msg; b.style.display='block'; }
  const won = n => n.toLocaleString('en-US');
  const today = () => new Date().toLocaleDateString('sv-SE');
  const fmtDate = d => d ? d.replaceAll('-','.').slice(2) : '';
  const isDone = s => !!state.achieved[s];
  const doneCount = () => Object.keys(state.achieved).length;
  function nextPending(){ for(const m of milestones) if(!isDone(m.seq)) return m; return null; }
  function nextReward(){ for(const m of milestones) if(state.rewards[m.seq] && !isDone(m.seq)) return m; return null; }
  let filter='all';
  function render(){
    const done=doneCount(), next=nextPending();
    document.getElementById('hCount').textContent=`${done} / ${N}`;
    const hero=document.getElementById('hero');
    if(next){
      const prev=milestones[next.seq-2];
      const delta = prev ? next.amount-prev.amount : 0;
      hero.className='hero'; hero.innerHTML=`
        <div class="seq num">${next.seq} / ${N}</div>
        <div class="eyebrow">다음 목표</div>
        <div class="amount num"><span class="cur">${CUR}</span>${won(next.amount)}</div>
        <div class="delta num">${prev?`직전보다 +${CUR}${won(delta)}`:'시작점'}</div>
        <div class="bar"><i style="width:${done/N*100}%"></i></div>
        <div class="bar-meta num"><span>${(done/N*100).toFixed(1)}%</span><span>남은 목표 ${N-done}개</span></div>
        <button class="stamp-btn" id="stampBtn">🖋️ 이 금액 달성 — 도장 찍기</button>`;
      document.getElementById('stampBtn').onclick=()=>stamp(next.seq);
    } else {
      hero.className='hero done'; hero.innerHTML=`
        <div class="eyebrow">완주</div>
        <div class="amount num"><span class="cur">${CUR}</span>${won(milestones[N-1].amount)}</div>
        <div class="delta">${N}개 목표를 모두 달성했습니다 🎉</div>`;
    }
    const cur = done ? milestones[Math.max(...Object.keys(state.achieved).map(Number))-1].amount : 0;
    document.getElementById('sCur').innerHTML = done?`${CUR}${won(cur)}`:'–';
    document.getElementById('sDone').innerHTML=`${done}<small> 개</small>`;
    const remRew=milestones.filter(m=>state.rewards[m.seq]&&!isDone(m.seq)).length;
    document.getElementById('sRew').innerHTML=`${remRew}<small> 개</small>`;
    const rs=document.getElementById('rewardStrip'), nr=nextReward();
    if(nr){ rs.style.display='flex';
      rs.innerHTML=`<div class="seal">🎁</div><div class="txt"><b>${nr.seq}번 선물 잠금 해제까지</b> · ${CUR}${won(nr.amount)}<br><span>${esc(state.rewards[nr.seq])}</span></div>`;
    } else rs.style.display='none';
    document.querySelectorAll('#filters button').forEach(b=>b.setAttribute('aria-pressed', b.dataset.f===filter));
    const list=document.getElementById('list'); list.innerHTML='';
    const nextSeq=next?next.seq:0;
    milestones.forEach(m=>{
      const d=isDone(m.seq), rwd=state.rewards[m.seq];
      if(filter==='done'&&!d) return;
      if(filter==='todo'&&d) return;
      if(filter==='reward'&&!rwd) return;
      const row=document.createElement('div');
      row.className='row'+(d?' is-done':'')+(rwd?' is-reward':'')+(m.seq===nextSeq?' next':'');
      row.tabIndex=0;
      row.innerHTML=`
        <div class="no num">${m.seq}</div>
        <div class="mid"><div class="amt num">${CUR}${won(m.amount)}</div>${rwd?`<div class="rwd">🎁 ${esc(rwd)}</div>`:''}</div>
        <div class="right">${d?`<div class="stamp-seal">${rwd?'🎁':'✓'}</div><div class="date num">${fmtDate(state.achieved[m.seq])}</div>`:`<div class="todo">미달성</div>`}</div>`;
      const open=()=>openModal(m.seq);
      row.onclick=open; row.onkeydown=e=>{if(e.key==='Enter')open();};
      list.appendChild(row);
    });
  }
  function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
  function stamp(seq){ state.achieved[seq]=today(); save(); render(); celebrate(!!state.rewards[seq]); }
  function openModal(seq){
    const m=milestones[seq-1], done=isDone(seq);
    const mb=document.getElementById('modalBg'), md=document.getElementById('modal');
    md.innerHTML=`
      <h3>${seq}번 목표 <span>${seq}/${N}</span></h3>
      <div class="big num">${CUR}${won(m.amount)}</div>
      <div class="field"><label>달성일</label><input type="date" id="mDate" value="${state.achieved[seq]||today()}"></div>
      <div class="field"><label>이 목표의 선물 (선택)</label><input type="text" id="mRwd" maxlength="40" placeholder="예: 좋아하는 카페에서 디저트" value="${esc(state.rewards[seq]||'')}"></div>
      <div class="m-actions">${done?`<button class="b-clear" id="mClear">도장 지우기</button>`:''}<button class="b-ghost" id="mCancel">닫기</button><button class="b-primary" id="mSave">${done?'저장':'도장 찍기'}</button></div>`;
    mb.classList.add('open');
    const close=()=>mb.classList.remove('open');
    md.querySelector('#mCancel').onclick=close;
    mb.onclick=e=>{if(e.target===mb)close();};
    md.querySelector('#mSave').onclick=()=>{
      const r=md.querySelector('#mRwd').value.trim();
      if(r) state.rewards[seq]=r; else delete state.rewards[seq];
      const wasDone=done;
      state.achieved[seq]=md.querySelector('#mDate').value||today();
      save(); render(); close();
      if(!wasDone) celebrate(!!state.rewards[seq]);
    };
    if(done) md.querySelector('#mClear').onclick=()=>{
      delete state.achieved[seq];
      const r=md.querySelector('#mRwd').value.trim();
      if(r) state.rewards[seq]=r; else delete state.rewards[seq];
      save(); render(); close();
    };
  }
  const cv=document.getElementById('fx'), ctx=cv.getContext('2d');
  function resize(){cv.width=innerWidth;cv.height=innerHeight;} resize(); addEventListener('resize',resize);
  function celebrate(big){
    if(matchMedia('(prefers-reduced-motion:reduce)').matches) return;
    const colors=['#E8B84B','#C2922B','#7FB7A6','#F3EBDD'];
    const parts=Array.from({length:big?120:60},()=>({
      x:innerWidth/2+(Math.random()-.5)*120, y:innerHeight*.35,
      vx:(Math.random()-.5)*9, vy:-Math.random()*13-5,
      s:Math.random()*6+4, c:colors[Math.random()*colors.length|0],
      r:Math.random()*6, vr:(Math.random()-.5)*.4, life:1 }));
    let t0;
    (function run(t){
      if(!t0)t0=t; const dt=Math.min((t-t0)/16.7,2); t0=t;
      ctx.clearRect(0,0,cv.width,cv.height); let alive=false;
      for(const p of parts){
        p.vy+=.45*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.r+=p.vr*dt; p.life-=.012*dt;
        if(p.life>0&&p.y<innerHeight+30){alive=true;
          ctx.save(); ctx.globalAlpha=Math.max(p.life,0); ctx.translate(p.x,p.y); ctx.rotate(p.r);
          ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*.6); ctx.restore(); }
      }
      if(alive) requestAnimationFrame(run); else ctx.clearRect(0,0,cv.width,cv.height);
    })(0);
  }
  document.getElementById('filters').onclick=e=>{const b=e.target.closest('button');if(!b)return;filter=b.dataset.f;render();};
  document.getElementById('exportBtn').onclick=()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download=`복리통장3pct_${today()}.json`; a.click(); URL.revokeObjectURL(a.href);
  };
  document.getElementById('importBtn').onclick=()=>document.getElementById('fileIn').click();
  document.getElementById('fileIn').onchange=e=>{
    const f=e.target.files[0]; if(!f)return; const r=new FileReader();
    r.onload=()=>{try{const d=JSON.parse(r.result); state={achieved:d.achieved||{},rewards:d.rewards||{}}; save(); render();
    }catch(err){alert('파일을 읽을 수 없습니다.');}}; r.readAsText(f);
  };
  document.getElementById('resetBtn').onclick=()=>{
    if(confirm('모든 달성 기록을 지웁니다. 선물 목록은 기본값으로 돌아갑니다. 계속할까요?')){
      state={achieved:{},rewards:{...DEFAULT_REWARDS}}; save(); render(); }
  };
  load(); render();
})();
</script>
</body>
</html>
